name: Release Please

# 手动触发：随便合并 PR，想发版时点击 "Run workflow"
on:
  workflow_dispatch:

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: simple
          package-name: bili-auto
          target-branch: main
