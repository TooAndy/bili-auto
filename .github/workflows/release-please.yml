name: Release Please

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      released: ${{ steps.release.outputs.released }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: simple
          package-name: bili-auto
          target-branch: main

  docker:
    needs: release-please
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - name: Normalize platform name for Docker tag
        run: echo "PLATFORM_TAG=${PLATFORM//\//-}" >> $GITHUB_ENV
        env:
          PLATFORM: ${{ matrix.platform }}

      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          tags: |
            ghcr.io/tooandy/bili-auto:latest
            ghcr.io/tooandy/bili-auto:${{ env.PLATFORM_TAG }}
            ghcr.io/tooandy/bili-auto:${{ github.ref_name }}
