name: Release Please

# 手动触发：随便合并 PR，想发版时点击 "Run workflow"
# 自动触发：tag push（用于 docker 构建）
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          release-type: simple
          package-name: bili-auto
          target-branch: main

  docker:
    # docker 完全独立：监听 tag push，不依赖 release-please
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - name: Normalize platform name for Docker tag
        run: echo "PLATFORM_TAG=${PLATFORM//\//-}" >> $GITHUB_ENV
        env:
          PLATFORM: ${{ matrix.platform }}

      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
          tags: |
            ghcr.io/tooandy/bili-auto:latest
            ghcr.io/tooandy/bili-auto:${{ env.PLATFORM_TAG }}
            ghcr.io/tooandy/bili-auto:${{ github.ref_name }}
